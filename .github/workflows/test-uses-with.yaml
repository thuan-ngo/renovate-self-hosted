name: Test uses-with dep type

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-uses-with:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Expect: Renovate updates ruby/setup-ruby action version + pin digest (depType: action)
      # Expect: Renovate does NOT update ruby-version (depType: uses-with, disabled)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.200.0
        with:
          ruby-version: "3.1"
          bundler-cache: true

      # Expect: Renovate does NOT update node-version (depType: uses-with, disabled)
      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "18"

      - name: Test result
        run: |
          echo "================================================"
          echo "✅ uses-with dep type test"
          echo "================================================"
          echo "Expected behavior:"
          echo "  • ruby/setup-ruby@v1.200.0 → Renovate updates version + pin digest (e.g. @<sha> # v1.221.0)"
          echo "  • ruby-version: 3.1  → Renovate does NOT update (uses-with disabled)"
          echo "  • node-version: 18   → Renovate does NOT update (uses-with disabled)"
          echo "================================================"
