name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
      
      - name: Run tests
        run: echo "✅ Tests passed successfully"
  
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '20'
      
      - name: Check renovate.json5 syntax
        run: |
          echo "✅ Checking renovate.json5 syntax..."
          node -e "require('json5').parse(require('fs').readFileSync('renovate.json5', 'utf8'))" 2>/dev/null || echo "json5 package not available, skipping validation"
      
      - name: Run lint
        run: echo "✅ Linting passed successfully"

  test-third-party-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Codecov (third-party - should pinDigests)
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        continue-on-error: true
        with:
          fail_ci_if_error: false
      
      - name: Slack Notification (third-party - should pinDigests)
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "CI test"}
      
      - name: SonarQube Scan (third-party - should pinDigests)
        uses: sonarsource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      
      - name: GitHub Release (third-party - should pinDigests)
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        continue-on-error: true
        with:
          draft: true
          files: README.md
      
      - name: Test result
        run: |
          echo "================================================"
          echo "✅ Third-party actions test completed"
          echo "================================================"
          echo "These actions should:"
          echo "  • Have pinDigests enabled"
          echo "  • Require manual review (no automerge)"
          echo "================================================"

